name: Build and Push

on:
  workflow_call:
    inputs:
      image:
        description: 'Docker image name (ex: muri1o/whatsapp-bot)'
        required: true
        type: string
      tag:
        description: 'Image tag'
        required: false
        type: string
        default: ''
      latest:
        description: 'Also tag as latest'
        required: false
        type: boolean
        default: false

jobs:
  build-push:
    runs-on: ubuntu-latest

    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ inputs.image }}:${{ inputs.tag || github.sha }}
            ${{ inputs.latest && format('ghcr.io/{0}:latest', inputs.image) || '' }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
