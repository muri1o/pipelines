name: CI

on:
  workflow_call:
    inputs:
      image:
        description: 'Docker image name (ex: muri1o/whatsapp-bot)'
        required: true
        type: string
      node-version:
        description: 'Node.js version'
        required: false
        type: string
        default: '20'
      test-command:
        description: 'Command to run tests'
        required: false
        type: string
        default: 'npm test'
      enable-stryker:
        description: 'Rodar mutation testing com Stryker'
        required: false
        type: boolean
        default: false
      enable-playwright:
        description: 'Rodar testes E2E de API com Playwright'
        required: false
        type: boolean
        default: false
      k6-script:
        description: 'Caminho para o script k6 (vazio = desabilitado)'
        required: false
        type: string
        default: ''

jobs:
  ci:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Secret scanning (truffleHog)
        uses: trufflesecurity/trufflehog@main
        with:
          path: ./
          base: ${{ github.event.repository.default_branch }}
          head: HEAD
          extra_args: --only-verified

      - name: SAST (Semgrep)
        uses: semgrep/semgrep-action@v1
        continue-on-error: true
        with:
          config: auto
        env:
          SEMGREP_APP_TOKEN: ${{ secrets.SEMGREP_APP_TOKEN }}

      - name: Build Docker image
        run: docker build -t ghcr.io/${{ inputs.image }}:${{ github.sha }} .

      - name: Vulnerability scan (Trivy)
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ghcr.io/${{ inputs.image }}:${{ github.sha }}
          format: table
          exit-code: '1'
          severity: CRITICAL,HIGH
          ignore-unfixed: true
          skip-dirs: /usr/local/lib/node_modules/npm

      - name: Generate SBOM (Syft)
        uses: anchore/sbom-action@v0
        with:
          image: ghcr.io/${{ inputs.image }}:${{ github.sha }}
          artifact-name: sbom-${{ github.sha }}.spdx.json
          output-file: sbom.spdx.json

      - name: Checkout pipelines (OPA policies)
        uses: actions/checkout@v4
        with:
          repository: muri1o/pipelines
          path: .ci-pipelines

      - name: Install conftest
        run: |
          curl -sL https://github.com/open-policy-agent/conftest/releases/download/v0.46.0/conftest_0.46.0_Linux_x86_64.tar.gz | tar xz -C /usr/local/bin

      - name: Policy check (OPA)
        run: |
          helm template helm/ | conftest test --policy .ci-pipelines/opa/policies/ -

      - name: Run tests
        run: ${{ inputs.test-command }}

      - name: Mutation testing (Stryker)
        if: inputs.enable-stryker
        run: npx stryker run

      - name: Upload mutation report
        if: inputs.enable-stryker && always()
        uses: actions/upload-artifact@v4
        with:
          name: stryker-report-${{ github.sha }}
          path: reports/mutation/

      - name: E2E tests (Playwright)
        if: inputs.enable-playwright
        run: npx playwright test
        env:
          TWILIO_ACCOUNT_SID: test
          TWILIO_AUTH_TOKEN: test
          TWILIO_WHATSAPP_NUMBER: '+15550000000'
          AUTHORIZED_NUMBER: '5511999999999'
          ANTHROPIC_API_KEY: test
          PORT: '3000'

      - name: Upload Playwright report
        if: inputs.enable-playwright && always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report-${{ github.sha }}
          path: playwright-report/

      - name: Install k6
        if: inputs.k6-script != ''
        run: |
          curl -fsSL https://dl.k6.io/key.gpg | sudo gpg --dearmor -o /usr/share/keyrings/k6-archive-keyring.gpg
          echo "deb [signed-by=/usr/share/keyrings/k6-archive-keyring.gpg] https://dl.k6.io/deb stable main" | sudo tee /etc/apt/sources.list.d/k6.list
          sudo apt-get update && sudo apt-get install k6 -y

      - name: Performance tests (k6)
        if: inputs.k6-script != ''
        continue-on-error: true
        run: |
          node index.js &
          SERVER_PID=$!
          npx wait-on http://localhost:3000/health --timeout 15000
          k6 run --summary-export=k6-summary.json ${{ inputs.k6-script }}
          kill $SERVER_PID
        env:
          TWILIO_ACCOUNT_SID: test
          TWILIO_AUTH_TOKEN: test
          TWILIO_WHATSAPP_NUMBER: '+15550000000'
          AUTHORIZED_NUMBER: '5511999999999'
          ANTHROPIC_API_KEY: test
          PORT: '3000'
          BASE_URL: http://localhost:3000

      - name: Upload k6 summary
        if: inputs.k6-script != ''
        uses: actions/upload-artifact@v4
        with:
          name: k6-summary-${{ github.sha }}
          path: k6-summary.json
